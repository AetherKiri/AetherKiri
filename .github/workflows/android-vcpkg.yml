name: Android Vcpkg Bundle

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.repository }}-android-vcpkg-bundle
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  VCPKG_BUNDLE_TAG: android-vcpkg-bundle
  VCPKG_BUNDLE_ASSET: android-vcpkg-bundle.tar.zst
  VCPKG_LEGACY_CACHE_RESTORE_KEY: Linux-android-vcpkg-

jobs:
  build-vcpkg:
    name: Build Android vcpkg bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool gettext bison flex curl unzip zip zstd jq

      - name: Restore existing Android vcpkg bundle
        id: restore-vcpkg-bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/restore-vcpkg-release-bundle.sh

      - name: Restore legacy vcpkg cache fallback
        if: steps.restore-vcpkg-bundle.outputs.restored != '1'
        uses: actions/cache/restore@v5
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-android-vcpkg-legacy-bootstrap
          restore-keys: |
            ${{ env.VCPKG_LEGACY_CACHE_RESTORE_KEY }}

      - name: Detect Android SDK and NDK
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_HOME:-}" ]]; then
            if [[ -d "$HOME/Android/Sdk" ]]; then
              echo "ANDROID_HOME=$HOME/Android/Sdk" >> "$GITHUB_ENV"
            elif [[ -d "/usr/local/lib/android/sdk" ]]; then
              echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
            fi
          else
            echo "ANDROID_HOME=${ANDROID_HOME}" >> "$GITHUB_ENV"
          fi

          sdk_root="${ANDROID_HOME:-${HOME}/Android/Sdk}"
          if [[ -d "${sdk_root}/ndk" ]]; then
            latest_ndk="$(find "${sdk_root}/ndk" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
            echo "ANDROID_NDK_HOME=${latest_ndk}" >> "$GITHUB_ENV"
          fi

      - name: Bootstrap vcpkg if needed
        run: |
          set -euo pipefail
          if [[ -d ".devtools/vcpkg" && ( ! -d ".devtools/vcpkg/ports" || ! -d ".devtools/vcpkg/versions" ) ]]; then
            rm -rf .devtools/vcpkg
          elif [[ -d ".devtools/vcpkg" && ! -x ".devtools/vcpkg/bootstrap-vcpkg.sh" && ! -x ".devtools/vcpkg/vcpkg" ]]; then
            rm -rf .devtools/vcpkg
          fi
          if [[ ! -d ".devtools/vcpkg/.git" ]]; then
            mkdir -p .devtools
            git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
          fi
          if [[ ! -x ".devtools/vcpkg/vcpkg" ]]; then
            if [[ ! -x ".devtools/vcpkg/bootstrap-vcpkg.sh" ]]; then
              rm -rf .devtools/vcpkg
              git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
            fi
            (cd .devtools/vcpkg && ./bootstrap-vcpkg.sh -disableMetrics)
          fi
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/.devtools/vcpkg" >> "$GITHUB_ENV"

      - name: Build Android vcpkg dependencies
        run: |
          set -euo pipefail

          export VCPKG_ROOT="${GITHUB_WORKSPACE}/.devtools/vcpkg"
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME}"

          VCPKG_BIN="${VCPKG_ROOT}/vcpkg"
          OVERLAY_PORTS="${GITHUB_WORKSPACE}/vcpkg/ports"
          OVERLAY_TRIPLETS="${GITHUB_WORKSPACE}/vcpkg/triplets"

          if [[ ! -d "${ANDROID_NDK_HOME:-}" ]]; then
            echo "ANDROID_NDK_HOME is missing" >&2
            exit 1
          fi

          (cd "${GITHUB_WORKSPACE}" && VCPKG_BUILD_TYPE=release "$VCPKG_BIN" install \
            --triplet arm64-android \
            --x-install-root="$VCPKG_ROOT/installed" \
            --x-manifest-root="${GITHUB_WORKSPACE}" \
            --overlay-ports="$OVERLAY_PORTS" \
            --overlay-triplets="$OVERLAY_TRIPLETS")

      - name: Pack Android vcpkg bundle
        env:
          VCPKG_TRIPLET: arm64-android
        run: bash .github/scripts/pack-vcpkg-release-bundle.sh

      - name: Smoke test Android vcpkg bundle layout
        run: |
          set -euo pipefail
          export VCPKG_ROOT="${GITHUB_WORKSPACE}/.devtools/vcpkg"
          export SKIP_ANDROID_VCPKG_INSTALL=1
          export CMAKE_MAKE_PROGRAM="$(command -v ninja || command -v ninja-build)"
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache

          cmake --preset "Android arm64 Release Config" --fresh \
            -D "CMAKE_MAKE_PROGRAM=$CMAKE_MAKE_PROGRAM" \
            -D "VCPKG_MANIFEST_INSTALL=OFF" \
            -D "VCPKG_INSTALLED_DIR=${GITHUB_WORKSPACE}/out/android/arm64-v8a/release/vcpkg_installed"

          rm -rf "${GITHUB_WORKSPACE}/out/android/arm64-v8a/debug/vcpkg_installed"
          mkdir -p "${GITHUB_WORKSPACE}/out/android/arm64-v8a/debug"
          ln -s "${VCPKG_ROOT}/installed" "${GITHUB_WORKSPACE}/out/android/arm64-v8a/debug/vcpkg_installed"
          cmake --preset "Android arm64 Debug Config" --fresh \
            -D "CMAKE_MAKE_PROGRAM=$CMAKE_MAKE_PROGRAM" \
            -D "VCPKG_MANIFEST_INSTALL=OFF" \
            -D "VCPKG_INSTALLED_DIR=${GITHUB_WORKSPACE}/out/android/arm64-v8a/debug/vcpkg_installed"

      - name: Publish single shared Android vcpkg bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-vcpkg-release-bundle.sh
