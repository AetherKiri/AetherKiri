name: Web Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Web App
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      EMSDK_VERSION: 4.0.15
      GODOT_RELEASE: 4.6.3-stable
      GODOT_TEMPLATE_VERSION: 4.6.3.stable

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool gettext bison flex curl unzip zip zstd ccache jq python3

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Restore Emscripten cache
        id: restore-emsdk
        uses: actions/cache/restore@v5
        with:
          path: .devtools/emsdk
          key: ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}

      - name: Install Emscripten
        run: |
          set -euo pipefail
          mkdir -p .devtools
          if [[ ! -d ".devtools/emsdk/.git" ]]; then
            rm -rf .devtools/emsdk
            git clone https://github.com/emscripten-core/emsdk.git .devtools/emsdk
          fi
          .devtools/emsdk/emsdk install "$EMSDK_VERSION"
          .devtools/emsdk/emsdk activate "$EMSDK_VERSION"
          {
            echo "EMSDK=${GITHUB_WORKSPACE}/.devtools/emsdk"
            echo "EMSCRIPTEN_ROOT=${GITHUB_WORKSPACE}/.devtools/emsdk/upstream/emscripten"
            echo "EMSDK_PYTHON=$(command -v python3)"
          } >> "$GITHUB_ENV"
          {
            echo "${GITHUB_WORKSPACE}/.devtools/emsdk"
            echo "${GITHUB_WORKSPACE}/.devtools/emsdk/upstream/emscripten"
          } >> "$GITHUB_PATH"

      - name: Install Godot export tools
        run: |
          set -euo pipefail
          mkdir -p .godot "${RUNNER_TEMP}/godot-templates"
          curl --fail --location --retry 5 --retry-delay 5 --retry-all-errors \
            -o "${RUNNER_TEMP}/godot-linux.zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -tq "${RUNNER_TEMP}/godot-linux.zip"
          unzip -q "${RUNNER_TEMP}/godot-linux.zip" -d .godot
          godot_bin="$(find .godot -maxdepth 1 -type f -name 'Godot*_linux.x86_64' | head -1)"
          if [[ -z "$godot_bin" ]]; then
            echo "Godot Linux binary not found after unzip" >&2
            exit 1
          fi
          chmod +x "$godot_bin"

          curl --fail --location --retry 5 --retry-delay 5 --retry-all-errors \
            -o "${RUNNER_TEMP}/godot-export-templates.tpz" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -tq "${RUNNER_TEMP}/godot-export-templates.tpz"
          unzip -q "${RUNNER_TEMP}/godot-export-templates.tpz" -d "${RUNNER_TEMP}/godot-templates"
          template_dir="${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "$template_dir"
          cp -a "${RUNNER_TEMP}/godot-templates/templates/." "$template_dir/"

          {
            echo "GODOT_BIN=${GITHUB_WORKSPACE}/${godot_bin}"
            echo "GODOT_TEMPLATE_DIR=${template_dir}"
          } >> "$GITHUB_ENV"

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-web-ccache

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Restore vcpkg cache
        id: restore-vcpkg
        uses: actions/cache/restore@v5
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-web-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg/**') }}
          restore-keys: |
            ${{ runner.os }}-web-vcpkg-

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          if [[ -d ".devtools/vcpkg" && ! -f ".devtools/vcpkg/.vcpkg-root" ]]; then
            rm -rf .devtools/vcpkg
          fi
          if [[ ! -d ".devtools/vcpkg/.git" ]]; then
            mkdir -p .devtools
            git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
          fi
          if [[ ! -x ".devtools/vcpkg/vcpkg" ]]; then
            (cd .devtools/vcpkg && ./bootstrap-vcpkg.sh -disableMetrics)
          fi
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/.devtools/vcpkg" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck Web scripts
        run: npm run typecheck

      - name: Build Web Release
        run: |
          set -euo pipefail
          source .devtools/emsdk/emsdk_env.sh
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          ./build.sh web release --jobs=4 2>&1 | tee "${RUNNER_TEMP}/web-build.log"
          if grep -E "SCRIPT ERROR|Failed to load script|Can't open GDExtension|Can't open dynamic library" "${RUNNER_TEMP}/web-build.log"; then
            echo "Godot Web export logged script or GDExtension load errors." >&2
            exit 1
          fi

      - name: Verify Web export
        run: |
          set -euo pipefail
          test -f out/godot/web/release/index.html
          test -f out/godot/web/release/index.wasm
          test -f out/godot/web/release/index.pck
          test -f out/godot/web/release/live2d/aetherkiri-live2d-bridge.js
          node --check build/web_export_local_picker.js
          node --check build/web_export_range_fs.js
          node --check build/patch_web_export.mjs

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: AetherKiri-Web
          path: out/godot/web/release
          retention-days: 7

      - name: Save vcpkg cache
        if: success() && github.event_name != 'pull_request' && steps.restore-vcpkg.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-web-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg/**') }}

      - name: Save Emscripten cache
        if: success() && github.event_name != 'pull_request' && steps.restore-emsdk.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: .devtools/emsdk
          key: ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}

      - name: Save ccache
        if: success() && github.event_name != 'pull_request' && steps.restore-ccache.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-web-ccache
