name: Web Vcpkg Bundle

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.repository }}-web-vcpkg-bundle
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  EMSDK_VERSION: 4.0.15
  VCPKG_BUNDLE_TAG: web-vcpkg-bundle
  VCPKG_BUNDLE_ASSET: web-vcpkg-bundle.tar.zst
  VCPKG_LEGACY_CACHE_RESTORE_KEY: Linux-web-vcpkg-

jobs:
  build-vcpkg:
    name: Build Web vcpkg bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool gettext bison flex curl unzip zip zstd ccache jq python3

      - name: Restore existing Web vcpkg bundle
        id: restore-vcpkg-bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/restore-vcpkg-release-bundle.sh

      - name: Restore legacy vcpkg cache fallback
        if: steps.restore-vcpkg-bundle.outputs.restored != '1'
        uses: actions/cache/restore@v5
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-web-vcpkg-legacy-bootstrap
          restore-keys: |
            ${{ env.VCPKG_LEGACY_CACHE_RESTORE_KEY }}

      - name: Restore Emscripten cache
        id: restore-emsdk
        uses: actions/cache/restore@v5
        with:
          path: .devtools/emsdk
          key: ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}

      - name: Install Emscripten
        run: |
          set -euo pipefail
          mkdir -p .devtools
          if [[ ! -d ".devtools/emsdk/.git" ]]; then
            rm -rf .devtools/emsdk
            git clone https://github.com/emscripten-core/emsdk.git .devtools/emsdk
          fi
          .devtools/emsdk/emsdk install "$EMSDK_VERSION"
          .devtools/emsdk/emsdk activate "$EMSDK_VERSION"
          {
            echo "EMSDK=${GITHUB_WORKSPACE}/.devtools/emsdk"
            echo "EMSCRIPTEN_ROOT=${GITHUB_WORKSPACE}/.devtools/emsdk/upstream/emscripten"
            echo "EMSDK_PYTHON=$(command -v python3)"
          } >> "$GITHUB_ENV"
          {
            echo "${GITHUB_WORKSPACE}/.devtools/emsdk"
            echo "${GITHUB_WORKSPACE}/.devtools/emsdk/upstream/emscripten"
          } >> "$GITHUB_PATH"

      - name: Bootstrap vcpkg if needed
        run: |
          set -euo pipefail
          if [[ -d ".devtools/vcpkg" && ( ! -d ".devtools/vcpkg/ports" || ! -d ".devtools/vcpkg/versions" ) ]]; then
            rm -rf .devtools/vcpkg
          elif [[ -d ".devtools/vcpkg" && ! -x ".devtools/vcpkg/bootstrap-vcpkg.sh" && ! -x ".devtools/vcpkg/vcpkg" ]]; then
            rm -rf .devtools/vcpkg
          fi
          if [[ ! -d ".devtools/vcpkg/.git" ]]; then
            mkdir -p .devtools
            git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
          fi
          if [[ ! -x ".devtools/vcpkg/vcpkg" ]]; then
            if [[ ! -x ".devtools/vcpkg/bootstrap-vcpkg.sh" ]]; then
              rm -rf .devtools/vcpkg
              git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
            fi
            (cd .devtools/vcpkg && ./bootstrap-vcpkg.sh -disableMetrics)
          fi
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/.devtools/vcpkg" >> "$GITHUB_ENV"

      - name: Build Web vcpkg dependencies
        run: |
          set -euo pipefail
          source .devtools/emsdk/emsdk_env.sh
          export VCPKG_ROOT="${GITHUB_WORKSPACE}/.devtools/vcpkg"
          VCPKG_BIN="${VCPKG_ROOT}/vcpkg"
          (cd "${GITHUB_WORKSPACE}" && "$VCPKG_BIN" install \
            --triplet wasm32-emscripten \
            --x-install-root="$VCPKG_ROOT/installed" \
            --x-manifest-root="${GITHUB_WORKSPACE}" \
            --overlay-ports="${GITHUB_WORKSPACE}/vcpkg/ports" \
            --overlay-triplets="${GITHUB_WORKSPACE}/vcpkg/triplets")

      - name: Pack Web vcpkg bundle
        env:
          VCPKG_TRIPLET: wasm32-emscripten
          VCPKG_BUNDLE_REQUIRE_DEBUG: '0'
        run: bash .github/scripts/pack-vcpkg-release-bundle.sh

      - name: Smoke test Web vcpkg bundle layout
        run: |
          set -euo pipefail
          source .devtools/emsdk/emsdk_env.sh
          export VCPKG_ROOT="${GITHUB_WORKSPACE}/.devtools/vcpkg"
          export CMAKE_MAKE_PROGRAM="$(command -v ninja || command -v ninja-build)"
          EMSCRIPTEN_TOOLCHAIN="${EMSCRIPTEN_ROOT}/cmake/Modules/Platform/Emscripten.cmake"
          embuilder --pic build libunwind-mt-legacyexcept
          embuilder --pic build libc++abi-mt-legacyexcept
          embuilder --pic build libc++-mt-legacyexcept

          rm -rf "${GITHUB_WORKSPACE}/out/web/release/vcpkg_installed"
          mkdir -p "${GITHUB_WORKSPACE}/out/web/release"
          ln -s "${VCPKG_ROOT}/installed" "${GITHUB_WORKSPACE}/out/web/release/vcpkg_installed"
          cmake --preset "Web Release Config" --fresh \
            -D "CMAKE_MAKE_PROGRAM=$CMAKE_MAKE_PROGRAM" \
            -D "VCPKG_CHAINLOAD_TOOLCHAIN_FILE=$EMSCRIPTEN_TOOLCHAIN" \
            -D "VCPKG_MANIFEST_INSTALL=OFF" \
            -D "VCPKG_INSTALLED_DIR=${GITHUB_WORKSPACE}/out/web/release/vcpkg_installed"

      - name: Publish Web vcpkg bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-vcpkg-release-bundle.sh

      - name: Save Emscripten cache
        if: always() && steps.restore-emsdk.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: .devtools/emsdk
          key: ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}
