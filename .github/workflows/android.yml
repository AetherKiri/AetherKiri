name: Android Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      GODOT_RELEASE: 4.6.3-stable
      GODOT_TEMPLATE_VERSION: 4.6.3.stable
      VCPKG_BUNDLE_TAG: android-vcpkg-bundle
      VCPKG_BUNDLE_ASSET: android-vcpkg-bundle.tar.zst

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool gettext bison flex curl unzip zip zstd ccache jq

      - name: Restore vcpkg release bundle
        id: restore-vcpkg-bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/restore-vcpkg-release-bundle.sh

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-android-ccache

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Godot export tools
        run: |
          set -euo pipefail
          mkdir -p .godot "${RUNNER_TEMP}/godot-templates"
          curl -L -o "${RUNNER_TEMP}/godot-linux.zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q "${RUNNER_TEMP}/godot-linux.zip" -d .godot
          godot_bin="$(find .godot -maxdepth 1 -type f -name 'Godot*_linux.x86_64' | head -1)"
          if [[ -z "$godot_bin" ]]; then
            echo "Godot Linux binary not found after unzip" >&2
            exit 1
          fi
          chmod +x "$godot_bin"

          curl -L -o "${RUNNER_TEMP}/godot-export-templates.tpz" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q "${RUNNER_TEMP}/godot-export-templates.tpz" -d "${RUNNER_TEMP}/godot-templates"
          template_dir="${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "${template_dir}"
          cp -a "${RUNNER_TEMP}/godot-templates/templates/." "${template_dir}/"

          echo "GODOT_BIN=${GITHUB_WORKSPACE}/${godot_bin}" >> "$GITHUB_ENV"
          echo "GODOT_TEMPLATE_DIR=${template_dir}" >> "$GITHUB_ENV"

      - name: Detect Android SDK and NDK
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_HOME:-}" ]]; then
            if [[ -d "$HOME/Android/Sdk" ]]; then
              echo "ANDROID_HOME=$HOME/Android/Sdk" >> "$GITHUB_ENV"
            elif [[ -d "/usr/local/lib/android/sdk" ]]; then
              echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
            fi
          else
            echo "ANDROID_HOME=${ANDROID_HOME}" >> "$GITHUB_ENV"
          fi

          sdk_root="${ANDROID_HOME:-${HOME}/Android/Sdk}"
          if [[ -d "${sdk_root}/ndk" ]]; then
            latest_ndk="$(find "${sdk_root}/ndk" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
            latest_ndk_version="$(basename "${latest_ndk}")"
            echo "ANDROID_NDK_HOME=${latest_ndk}" >> "$GITHUB_ENV"
            echo "ANDROID_NDK_VERSION=${latest_ndk_version}" >> "$GITHUB_ENV"
          else
            echo "Android NDK directory not found under ${sdk_root}/ndk" >&2
            exit 1
          fi

      - name: Restore vcpkg cache
        if: steps.restore-vcpkg-bundle.outputs.restored != '1'
        id: restore-vcpkg
        uses: actions/cache/restore@v5
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-android-vcpkg

      - name: Bootstrap vcpkg
        if: steps.restore-vcpkg-bundle.outputs.restored != '1'
        run: |
          set -euo pipefail
          if [[ -d ".devtools/vcpkg" && ! -d ".devtools/vcpkg/.git" ]]; then
            rm -rf .devtools/vcpkg
          fi
          if [[ ! -d ".devtools/vcpkg/.git" ]]; then
            mkdir -p .devtools
            git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
          fi
          if [[ ! -x ".devtools/vcpkg/vcpkg" ]]; then
            (cd .devtools/vcpkg && ./bootstrap-vcpkg.sh -disableMetrics)
          fi
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/.devtools/vcpkg" >> "$GITHUB_ENV"

      - name: Configure Android signing
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_ALIAS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          signing_dir="${RUNNER_TEMP}/android-signing"
          mkdir -p "$signing_dir"

          debug_keystore="${signing_dir}/debug.keystore"
          keytool -genkeypair \
            -keystore "$debug_keystore" \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          {
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$debug_keystore"
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey"
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android"
          } >> "$GITHUB_ENV"

          release_secret_count=0
          [[ -n "${ANDROID_RELEASE_KEYSTORE_BASE64}" ]] && release_secret_count=$((release_secret_count + 1))
          [[ -n "${ANDROID_RELEASE_KEYSTORE_ALIAS}" ]] && release_secret_count=$((release_secret_count + 1))
          [[ -n "${ANDROID_RELEASE_KEYSTORE_PASSWORD}" ]] && release_secret_count=$((release_secret_count + 1))

          if [[ "$release_secret_count" -ne 3 ]]; then
            echo "Android release signing secrets are incomplete. Configure ANDROID_RELEASE_KEYSTORE_BASE64, ANDROID_RELEASE_KEYSTORE_ALIAS, and ANDROID_RELEASE_KEYSTORE_PASSWORD." >&2
            exit 1
          fi

          release_keystore="${signing_dir}/release.keystore"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 -d > "$release_keystore"
          chmod 600 "$release_keystore"
          keytool -list \
            -keystore "$release_keystore" \
            -storepass "$ANDROID_RELEASE_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_RELEASE_KEYSTORE_ALIAS" >/dev/null
          {
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$release_keystore"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=$ANDROID_RELEASE_KEYSTORE_ALIAS"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=$ANDROID_RELEASE_KEYSTORE_PASSWORD"
          } >> "$GITHUB_ENV"
          perl -0pi -e 's/(name="Android Release".*?package\/signed=)false/${1}true/s' apps/godot_app/export_presets.cfg

      - name: Build Android Release
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export NDK_CCACHE=ccache
          ./build.sh android release --jobs=4

      - name: Build Android Debug
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export NDK_CCACHE=ccache
          ./build.sh android debug --jobs=4

      - name: Verify exported APKs
        run: |
          set -euo pipefail
          test -f out/godot/android/release/AetherKiri-release.apk
          test -f out/godot/android/debug/AetherKiri-debug.apk

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: AetherKiri-Android-APK
          path: out/godot/android/release/AetherKiri-release.apk
          retention-days: 7

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: AetherKiri-Android-Debug-APK
          path: out/godot/android/debug/AetherKiri-debug.apk
          retention-days: 7

      - name: Save vcpkg cache
        if: success() && github.event_name != 'pull_request' && steps.restore-vcpkg-bundle.outputs.restored != '1' && steps.restore-vcpkg.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-android-vcpkg

      - name: Save ccache
        if: success() && github.event_name != 'pull_request' && steps.restore-ccache.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-android-ccache
