name: Android Build

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read

env:
  VCPKG_BUNDLE_TAG: android-vcpkg-bundle
  VCPKG_BUNDLE_ASSET: android-vcpkg-bundle.tar.zst
  VCPKG_LEGACY_CACHE_RESTORE_KEY: Linux-android-vcpkg-

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      GODOT_RELEASE: 4.6.3-stable
      GODOT_TEMPLATE_VERSION: 4.6.3.stable

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool gettext bison flex curl unzip zip zstd ccache jq

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-android-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-android-ccache-

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Godot export tools
        run: |
          set -euo pipefail
          mkdir -p .godot "${RUNNER_TEMP}/godot-templates"
          curl -L -o "${RUNNER_TEMP}/godot-linux.zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q "${RUNNER_TEMP}/godot-linux.zip" -d .godot
          godot_bin="$(find .godot -maxdepth 1 -type f -name 'Godot*_linux.x86_64' | head -1)"
          if [[ -z "$godot_bin" ]]; then
            echo "Godot Linux binary not found after unzip" >&2
            exit 1
          fi
          chmod +x "$godot_bin"

          curl -L -o "${RUNNER_TEMP}/godot-export-templates.tpz" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q "${RUNNER_TEMP}/godot-export-templates.tpz" -d "${RUNNER_TEMP}/godot-templates"
          template_dir="${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "${template_dir}"
          cp -a "${RUNNER_TEMP}/godot-templates/templates/." "${template_dir}/"

          echo "GODOT_BIN=${GITHUB_WORKSPACE}/${godot_bin}" >> "$GITHUB_ENV"
          echo "GODOT_TEMPLATE_DIR=${template_dir}" >> "$GITHUB_ENV"

      - name: Detect Android SDK and NDK
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_HOME:-}" ]]; then
            if [[ -d "$HOME/Android/Sdk" ]]; then
              echo "ANDROID_HOME=$HOME/Android/Sdk" >> "$GITHUB_ENV"
            elif [[ -d "/usr/local/lib/android/sdk" ]]; then
              echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
            fi
          else
            echo "ANDROID_HOME=${ANDROID_HOME}" >> "$GITHUB_ENV"
          fi

          sdk_root="${ANDROID_HOME:-${HOME}/Android/Sdk}"
          if [[ -d "${sdk_root}/ndk" ]]; then
            latest_ndk="$(find "${sdk_root}/ndk" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
            latest_ndk_version="$(basename "${latest_ndk}")"
            echo "ANDROID_NDK_HOME=${latest_ndk}" >> "$GITHUB_ENV"
            echo "ANDROID_NDK_VERSION=${latest_ndk_version}" >> "$GITHUB_ENV"
          else
            echo "Android NDK directory not found under ${sdk_root}/ndk" >&2
            exit 1
          fi

      - name: Restore Android vcpkg bundle
        id: restore-vcpkg-bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/vcpkg"
          if gh release download "${VCPKG_BUNDLE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${VCPKG_BUNDLE_ASSET}" \
            --dir "${RUNNER_TEMP}/android-vcpkg-bundle"; then
            mkdir -p "${RUNNER_TEMP}/android-vcpkg-bundle/extracted"
            tar --zstd -xf "${RUNNER_TEMP}/android-vcpkg-bundle/${VCPKG_BUNDLE_ASSET}" \
              -C "${RUNNER_TEMP}/android-vcpkg-bundle/extracted"
            cp -a "${RUNNER_TEMP}/android-vcpkg-bundle/extracted/workspace/." "${GITHUB_WORKSPACE}/" || true
            cp -a "${RUNNER_TEMP}/android-vcpkg-bundle/extracted/home-cache/." "$HOME/.cache/" || true
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate restored Android vcpkg bundle
        id: validate-vcpkg-bundle
        run: |
          set -euo pipefail
          if [[ -d ".devtools/vcpkg/installed/arm64-android" && -f ".devtools/vcpkg/scripts/buildsystems/vcpkg.cmake" ]]; then
            echo "usable=true" >> "$GITHUB_OUTPUT"
          else
            echo "usable=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f ".devtools/vcpkg/bootstrap-vcpkg.sh" ]]; then
            chmod +x ".devtools/vcpkg/bootstrap-vcpkg.sh"
          fi
          if [[ -f ".devtools/vcpkg/vcpkg" ]]; then
            chmod +x ".devtools/vcpkg/vcpkg"
          fi

      - name: Restore legacy vcpkg cache fallback
        if: steps.validate-vcpkg-bundle.outputs.usable != 'true'
        id: restore-legacy-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-android-vcpkg-legacy-bootstrap
          restore-keys: |
            ${{ env.VCPKG_LEGACY_CACHE_RESTORE_KEY }}

      - name: Require prebuilt Android vcpkg dependencies
        run: |
          set -euo pipefail
          if [[ "${{ steps.validate-vcpkg-bundle.outputs.usable }}" != "true" && "${{ steps.restore-legacy-vcpkg.outputs.cache-matched-key }}" = "" ]]; then
            echo "No prebuilt Android vcpkg bundle or legacy cache was restored." >&2
            echo "Run the Android Vcpkg Bundle workflow first." >&2
            exit 1
          fi
          if [[ ! -d ".devtools/vcpkg/installed/arm64-android" ]]; then
            echo "Prebuilt Android vcpkg triplet arm64-android is missing." >&2
            exit 1
          fi
          if [[ ! -f ".devtools/vcpkg/scripts/buildsystems/vcpkg.cmake" ]]; then
            echo "Prebuilt Android vcpkg toolchain file is missing." >&2
            exit 1
          fi

      - name: Repair Android godot-cpp dependency
        run: |
          set -euo pipefail
          export VCPKG_ROOT="${GITHUB_WORKSPACE}/.devtools/vcpkg"
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME}"

          if [[ -d "${VCPKG_ROOT}/installed/arm64-android/include/godot_cpp" ]] && \
             compgen -G "${VCPKG_ROOT}/installed/arm64-android/lib/libgodot-cpp*.a" >/dev/null; then
            echo "godot-cpp already present in restored Android vcpkg bundle."
            exit 0
          fi

          echo "Restored Android vcpkg bundle is missing godot-cpp; installing only that overlay port."
          "${VCPKG_ROOT}/vcpkg" install godot-cpp \
            --triplet arm64-android \
            --x-install-root="${VCPKG_ROOT}/installed" \
            --overlay-ports="${GITHUB_WORKSPACE}/vcpkg/ports" \
            --overlay-triplets="${GITHUB_WORKSPACE}/vcpkg/triplets"

      - name: Build Android Release
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export NDK_CCACHE=ccache
          export SKIP_ANDROID_VCPKG_INSTALL=1

          for attempt in 1 2 3; do
            if ./build.sh android release --jobs=4; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Android build failed on attempt ${attempt}, retrying..."
            sleep $((attempt * 20))
          done

      - name: Verify exported APK
        run: |
          set -euo pipefail
          test -f out/godot/android/release/AetherKiri-release.apk

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-Android-APK
          path: out/godot/android/release/AetherKiri-release.apk
          retention-days: 7

      - name: Save ccache
        if: always() && !cancelled()
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-android-ccache-${{ github.run_id }}
