name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      GODOT_RELEASE: 4.6.3-stable
      GODOT_TEMPLATE_VERSION: 4.6.3.stable
      VCPKG_BUNDLE_TAG: ios-vcpkg-bundle
      VCPKG_BUNDLE_ASSET: ios-vcpkg-bundle.tar.zst

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Build Systems
        run: |
          brew install cmake ninja pkg-config autoconf automake autoconf-archive libtool gettext coreutils bison ccache
          echo "$(brew --prefix gettext)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Restore vcpkg release bundle
        id: restore-vcpkg-bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/restore-vcpkg-release-bundle.sh

      - name: Install Godot export tools
        run: |
          set -euo pipefail
          mkdir -p .godot "${RUNNER_TEMP}/godot-templates"
          curl --fail --location --retry 5 --retry-delay 5 --retry-all-errors \
            -o "${RUNNER_TEMP}/godot-macos.zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_macos.universal.zip"
          unzip -tq "${RUNNER_TEMP}/godot-macos.zip"
          unzip -q "${RUNNER_TEMP}/godot-macos.zip" -d .godot
          chmod +x ".godot/Godot.app/Contents/MacOS/Godot"

          curl --fail --location --retry 5 --retry-delay 5 --retry-all-errors \
            -o "${RUNNER_TEMP}/godot-export-templates.tpz" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -tq "${RUNNER_TEMP}/godot-export-templates.tpz"
          unzip -q "${RUNNER_TEMP}/godot-export-templates.tpz" -d "${RUNNER_TEMP}/godot-templates"
          template_dir="${HOME}/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "${template_dir}"
          cp -a "${RUNNER_TEMP}/godot-templates/templates/." "${template_dir}/"

          echo "GODOT_BIN=${GITHUB_WORKSPACE}/.godot/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"
          echo "GODOT_EXPORT_TEMPLATE=${template_dir}/ios.zip" >> "$GITHUB_ENV"

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-ios-ccache

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Restore vcpkg cache
        if: steps.restore-vcpkg-bundle.outputs.restored != '1'
        id: restore-vcpkg
        uses: actions/cache/restore@v5
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-ios-vcpkg

      - name: Bootstrap vcpkg
        if: steps.restore-vcpkg-bundle.outputs.restored != '1'
        run: |
          set -euo pipefail
          if [[ -d ".devtools/vcpkg" && ! -f ".devtools/vcpkg/.vcpkg-root" ]]; then
            rm -rf .devtools/vcpkg
          fi
          if [[ ! -d ".devtools/vcpkg/.git" ]]; then
            mkdir -p .devtools
            git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
          fi
          if [[ ! -x ".devtools/vcpkg/vcpkg" ]]; then
            (cd .devtools/vcpkg && ./bootstrap-vcpkg.sh -disableMetrics)
          fi
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/.devtools/vcpkg" >> "$GITHUB_ENV"

      - name: Build iOS Debug
        run: |
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          ./build.sh ios debug --jobs=4

      - name: Build iOS Release
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          ./build.sh ios release --jobs=4

      - name: Verify exported Xcode project
        run: |
          set -euo pipefail
          for build_type in debug release; do
            if [[ ! -d "out/godot/ios/${build_type}/AetherKiri.xcodeproj" ]]; then
              echo "Godot iOS ${build_type} Xcode project not found" >&2
              exit 1
            fi
            if [[ ! -d "out/godot/ios/${build_type}/AetherKiri" ]]; then
              echo "Godot iOS ${build_type} project sources not found" >&2
              exit 1
            fi
          done

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: AetherKiri-iOS-XcodeProject
          path: |
            out/godot/ios/debug/AetherKiri.xcodeproj
            out/godot/ios/debug/AetherKiri
            out/godot/ios/release/AetherKiri.xcodeproj
            out/godot/ios/release/AetherKiri
          retention-days: 7

      - name: Save vcpkg cache
        if: success() && github.event_name != 'pull_request' && steps.restore-vcpkg-bundle.outputs.restored != '1' && steps.restore-vcpkg.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-ios-vcpkg

      - name: Save ccache
        if: success() && github.event_name != 'pull_request' && steps.restore-ccache.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-ios-ccache
