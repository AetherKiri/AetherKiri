name: macOS Build

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      GODOT_RELEASE: 4.6.3-stable
      GODOT_TEMPLATE_VERSION: 4.6.3.stable

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          brew install cmake ninja pkg-config autoconf automake autoconf-archive gettext coreutils bison ccache
          echo "$(brew --prefix gettext)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Install NuGet runtime
        run: |
          if ! command -v mono >/dev/null; then
            brew install mono
          fi

      - name: Install Godot export tools
        run: |
          set -euo pipefail
          mkdir -p .godot "${RUNNER_TEMP}/godot-templates"
          curl -L -o "${RUNNER_TEMP}/godot-macos.zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_macos.universal.zip"
          unzip -q "${RUNNER_TEMP}/godot-macos.zip" -d .godot
          chmod +x ".godot/Godot.app/Contents/MacOS/Godot"

          curl -L -o "${RUNNER_TEMP}/godot-export-templates.tpz" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q "${RUNNER_TEMP}/godot-export-templates.tpz" -d "${RUNNER_TEMP}/godot-templates"
          template_dir="${HOME}/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "${template_dir}"
          cp -a "${RUNNER_TEMP}/godot-templates/templates/." "${template_dir}/"

          echo "GODOT_BIN=${GITHUB_WORKSPACE}/.godot/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"
          echo "GODOT_EXPORT_TEMPLATE=${template_dir}/macos.zip" >> "$GITHUB_ENV"

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-macos-ccache

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Restore vcpkg cache
        id: restore-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-macos-vcpkg

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          if [[ -d ".devtools/vcpkg" && ! -f ".devtools/vcpkg/.vcpkg-root" ]]; then
            rm -rf .devtools/vcpkg
          fi
          if [[ ! -d ".devtools/vcpkg/.git" ]]; then
            mkdir -p .devtools
            git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
          fi
          if [[ ! -x ".devtools/vcpkg/vcpkg" ]]; then
            (cd .devtools/vcpkg && ./bootstrap-vcpkg.sh -disableMetrics)
          fi
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/.devtools/vcpkg" >> "$GITHUB_ENV"

      - name: Configure vcpkg GitHub Packages cache
        env:
          VCPKG_NUGET_TOKEN: ${{ github.token }}
          VCPKG_BINARY_CACHE_MODE: readwrite
        run: bash .github/scripts/configure-vcpkg-github-packages.sh

      - name: Build macOS Release
        run: |
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          ./build.sh macos release --jobs=4

      - name: Verify built .app
        run: |
          set -euo pipefail
          APP_PATH="out/godot/macos/release/AetherKiri.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Built Godot .app bundle not found: $APP_PATH" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-macOS
          path: out/godot/macos/release/AetherKiri.app
          retention-days: 7

      - name: Save vcpkg cache
        if: success() && steps.restore-vcpkg.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-macos-vcpkg

      - name: Save ccache
        if: success() && steps.restore-ccache.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-macos-ccache
